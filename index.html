<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sostiene Pauleta</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#FF6B35">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Pauleta">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <link rel="stylesheet" href="styles/main.css">
</head>
<body>

  <!-- ── HEADER ── -->
  <header>
    <div class="header-content">
      <!-- Avatar SVG di Pauleta -->
      <div class="avatar-wrapper" aria-hidden="true">
        <svg class="avatar-svg" viewBox="0 0 90 112" xmlns="http://www.w3.org/2000/svg">

          <!-- ── CORPO ── -->
          <rect x="37" y="74" width="16" height="12" rx="4" fill="#F2C9A0" stroke="#1A1A2E" stroke-width="2.2"/>
          <rect x="11" y="82" width="68" height="30" rx="12" fill="#2B5BA8" stroke="#1A1A2E" stroke-width="2.5"/>
          <polygon points="45,82 37,93 45,91" fill="#FFFFFF" stroke="#1A1A2E" stroke-width="1.5"/>
          <polygon points="45,82 53,93 45,91" fill="#FFFFFF" stroke="#1A1A2E" stroke-width="1.5"/>

          <!-- ── TESTA — viso allungato, mento appuntito ── -->
          <path d="M20 44 Q20 16 45 16 Q70 16 70 44 Q70 64 58 70 Q51 74 45 74 Q39 74 32 70 Q20 64 20 44 Z"
                fill="#F2C9A0" stroke="#1A1A2E" stroke-width="2.8"/>

          <!-- ── CAPELLI — frangetta DRITTA netta ── -->
          <!-- Volume superiore capelli -->
          <path d="M20 35 Q20 10 45 8 Q70 10 70 35 Z" fill="#1A1A2E"/>
          <!-- Rettangolo che forma il taglio netto della frangetta -->
          <rect x="20" y="32" width="50" height="5" fill="#1A1A2E"/>
          <!-- Ciocca sinistra lunga -->
          <path d="M20 35 Q16 50 17 64 Q18 70 21 72" fill="none" stroke="#1A1A2E" stroke-width="8" stroke-linecap="round"/>
          <!-- Ciocca destra lunga -->
          <path d="M70 35 Q74 50 73 64 Q72 70 69 72" fill="none" stroke="#1A1A2E" stroke-width="8" stroke-linecap="round"/>

          <!-- ── SOPRACCIGLIA ── -->
          <!-- Sinistra: un po' alzata (sorpresa) -->
          <path d="M27 36.5 Q33 31.5 40 34.5" fill="none" stroke="#1A1A2E" stroke-width="2.5" stroke-linecap="round"/>
          <!-- Destra: abbassata verso il centro (indignazione) -->
          <path d="M50 34 Q57 31 63 35.5" fill="none" stroke="#1A1A2E" stroke-width="2.5" stroke-linecap="round"/>

          <!-- ── OCCHIO SINISTRO ── grande, espressivo -->
          <!-- Bianco -->
          <ellipse cx="33.5" cy="42.5" rx="7" ry="8" fill="#FFFFFF" stroke="#1A1A2E" stroke-width="2.2"/>
          <!-- Iride -->
          <ellipse cx="33.5" cy="43.5" rx="4.2" ry="5" fill="#5C3510"/>
          <!-- Pupilla -->
          <ellipse cx="33.5" cy="43.5" rx="2.5" ry="3" fill="#1A1A2E"/>
          <!-- Luce -->
          <circle cx="35.5" cy="41" r="1.6" fill="#FFFFFF"/>
          <!-- Ciglia sx: arco spesso sull'occhio -->
          <path d="M26.5 39 Q33.5 34 40.5 39" fill="none" stroke="#1A1A2E" stroke-width="3.5" stroke-linecap="round"/>

          <!-- ── OCCHIO DESTRO ── -->
          <ellipse cx="56.5" cy="42.5" rx="7" ry="8" fill="#FFFFFF" stroke="#1A1A2E" stroke-width="2.2"/>
          <ellipse cx="56.5" cy="43.5" rx="4.2" ry="5" fill="#5C3510"/>
          <ellipse cx="56.5" cy="43.5" rx="2.5" ry="3" fill="#1A1A2E"/>
          <circle cx="58.5" cy="41" r="1.6" fill="#FFFFFF"/>
          <!-- Ciglia dx: arco spesso sull'occhio -->
          <path d="M49.5 39 Q56.5 34 63.5 39" fill="none" stroke="#1A1A2E" stroke-width="3.5" stroke-linecap="round"/>

          <!-- ── NASO — piccolo, delicato, due naricine ── -->
          <path d="M43 55 Q45 58 47 55" fill="none" stroke="#C07848" stroke-width="2" stroke-linecap="round"/>
          <circle cx="42.5" cy="56.5" r="1.4" fill="#C07848" opacity="0.75"/>
          <circle cx="47.5" cy="56.5" r="1.4" fill="#C07848" opacity="0.75"/>

          <!-- ── BOCCA aperta, espressiva ── -->
          <!-- Labbra superiori -->
          <path d="M34 63 Q39 60 45 61 Q51 60 56 63" fill="#E03030" stroke="#1A1A2E" stroke-width="2" stroke-linecap="round"/>
          <!-- Labbra inferiori e bocca aperta -->
          <path d="M34 63 Q40 72 45 73 Q50 72 56 63" fill="#FFFFFF" stroke="#1A1A2E" stroke-width="2" stroke-linecap="round"/>
          <!-- Interno bocca -->
          <path d="M36 64 Q45 72 54 64" fill="#C0202020"/>
          <!-- Lingua -->
          <ellipse cx="45" cy="69" rx="5.5" ry="3" fill="#E03030" stroke="none"/>

          <!-- ── BLUSH zigomi ── -->
          <ellipse cx="22" cy="53" rx="6" ry="3.5" fill="#FF9999" opacity="0.45"/>
          <ellipse cx="68" cy="53" rx="6" ry="3.5" fill="#FF9999" opacity="0.45"/>

          <!-- ── LINEE indignazione ── -->
          <line x1="11" y1="41" x2="16" y2="44" stroke="#1A1A2E" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="11" y1="48" x2="17" y2="48" stroke="#1A1A2E" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="79" y1="41" x2="74" y2="44" stroke="#1A1A2E" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="79" y1="48" x2="73" y2="48" stroke="#1A1A2E" stroke-width="1.8" stroke-linecap="round"/>

          <!-- Esclamativo -->
          <text x="73" y="15" font-family="Bangers, cursive" font-size="19" fill="#E03030" stroke="#1A1A2E" stroke-width="1" paint-order="stroke">!</text>
        </svg>
      </div>

      <div class="header-text">
        <h1>SOSTIENE<br>PAULETA</h1>
        <p class="sottotitolo">Il fedele cronista delle sue massime</p>
      </div>
    </div>
  </header>

  <div class="container">

    <!-- ── VINCITORE DEL GIORNO ── -->
    <section class="vincitore-section" aria-label="Frase del giorno">
      <div class="vincitore-box" id="vincitore-box">
        <!-- Popolato da JS -->
      </div>
    </section>

    <!-- ── LISTA FRASI ── -->
    <section aria-label="Frasi di Pauleta">
      <div class="frasi-list" id="frasi-list" role="list">
        <!-- Popolato da JS -->
      </div>
    </section>

    <!-- ── STORICO ── -->
    <section class="storico-section" aria-label="Storico giorni precedenti">
      <button class="storico-toggle" id="storico-toggle" aria-expanded="false" aria-controls="storico-content">
        <span>📅 STORICO GIORNI PRECEDENTI</span>
        <span class="arrow" aria-hidden="true">▼</span>
      </button>
      <div class="storico-content" id="storico-content" role="region">
        <!-- Popolato da JS al click -->
      </div>
    </section>

  </div>

  <footer>
    <p>Con affetto e cronaca fedele &mdash; Sostiene Pauleta &copy; 2025</p>
  </footer>

  <script src="scripts/app.js"></script>
</body>
</html>
